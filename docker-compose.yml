version: '3.8'

services:
  php:
    build:
      context: .                          
      dockerfile: docker/php/Dockerfile   
    container_name: laravel_php_kelompok_3_4e
    restart: unless-stopped               
    working_dir: /var/www/html

    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini  

    networks:
      - laravel_network_kelompok_3_4e

    depends_on:
      - mysql
      # - redis

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx_kelompok_3_4e
    restart: unless-stopped

    ports:
      - "80:80"
      - "7003:443"

    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/www:/var/www/certbot:ro
      - ./data:/etc/letsencrypt

    networks:
      - laravel_network_kelompok_3_4e

    depends_on:
      - php

  certbot:
    image: certbot/certbot
    container_name: laravel_certbot_kelompok_3_4e
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./data:/etc/letsencrypt
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: laravel_mysql_kelompok_3_4e
    restart: unless-stopped

    ports:
      - "3306"

    environment:
      - MYSQL_DATABASE=${DB_DATABASE:-app}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-secret}
      - MYSQL_USER=${DB_USERNAME:-laravel}
      - MYSQL_PASSWORD=${DB_PASSWORD:-secret}

    volumes:
      - db_data_kelompok_3_4e:/var/lib/mysql
    networks:
      - laravel_network_kelompok_3_4e

    command: --default-authentication-plugin=caching_sha2_password

  phpmyadmin:
      image: phpmyadmin/phpmyadmin
      container_name: laravel_pma_kelompok_3_4e
      ports:
        - "7003"
      environment:
        PMA_HOST: mysql
        PMA_PORT: 3306
        UPLOAD_LIMIT: 64M
        PMA_ABSOLUTE_URI: "https://api-mahasiswa-4e.rifkiaja.my.id:7003/phpmyadmin/"
      depends_on:
        - mysql
      networks:
        - laravel_network_kelompok_3_4e

  # redis:
  #   image: redis:7-alpine
  #   container_name: laravel_redis
  #   restart: unless-stopped

  #   ports:
  #     - "6379:6379"

  #   volumes:
  #     - redis_data:/data

  #   networks:
  #     - laravel_network

  #   command: redis-server --appendonly yes

networks:
  laravel_network_kelompok_3_4e:
    driver: bridge

volumes:
  db_data_kelompok_3_4e:
    driver: local
  # redis_data:
  #   driver: local